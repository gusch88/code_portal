<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KFZ-Kennzeichen Sammler</title>

<!-- PWA -->
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#0d0d0f">
<link rel="apple-touch-icon" href="./icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d0f; --surface: #16181c; --surface2: #1e2028;
    --border: #2a2d38; --accent: #f5c518; --accent2: #e8a800;
    --text: #f0f0f2; --muted: #7a7f8e; --red: #ef4444; --green: #4ade80;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; overflow-x: hidden; }
  body::before {
    content: ''; position: fixed; inset: 0;
    background-image: linear-gradient(rgba(245,197,24,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(245,197,24,0.03) 1px, transparent 1px);
    background-size: 40px 40px; pointer-events: none; z-index: 0;
  }

  nav {
    position: sticky; top: 0; z-index: 60;
    background: rgba(13,13,15,0.92); backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 16px; padding: 0 24px; height: 56px;
  }
  .nav-back {
    background: var(--surface2); border: 1px solid var(--border); color: var(--muted);
    border-radius: 7px; padding: 6px 12px; font-size: 0.8rem; cursor: pointer;
    text-decoration: none; transition: all 0.15s; display: flex; align-items: center; gap: 6px;
  }
  .nav-back:hover { border-color: var(--accent); color: var(--accent); }
  .nav-title { font-family: 'Bebas Neue', sans-serif; font-size: 1.4rem; letter-spacing: 3px; }
  .nav-title span { color: var(--accent); }
  .nav-user { margin-left: auto; font-size: 0.75rem; color: var(--muted); font-family: 'DM Mono', monospace; }

  .conn-status { display: flex; align-items: center; gap: 6px; font-size: 0.75rem; color: var(--muted); font-family: 'DM Mono', monospace; white-space: nowrap; }
  .conn-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); flex-shrink: 0; transition: background 0.2s; }
  .conn-status.offline .conn-dot { background: var(--red); }
  .pending-badge {
    display: none; align-items: center; gap: 5px; background: rgba(245,197,24,0.12);
    border: 1px solid rgba(245,197,24,0.35); color: var(--accent); border-radius: 999px;
    padding: 3px 10px; font-size: 0.72rem; font-family: 'DM Mono', monospace; cursor: default;
  }
  .pending-badge.show { display: inline-flex; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  .pending-badge.syncing { animation: pulse 1.1s ease-in-out infinite; }

  .loading-screen {
    position: fixed; inset: 0; background: var(--bg);
    display: flex; align-items: center; justify-content: center;
    z-index: 200; font-family: 'Bebas Neue', sans-serif;
    font-size: 1.2rem; letter-spacing: 3px; color: var(--muted);
  }
  .loading-screen.hidden { display: none; }

  /* ── Quick-Add Bar (immer sichtbar, oberhalb der Tabs) ── */
  .quickadd-bar {
    position: sticky; top: 56px; z-index: 55;
    background: rgba(13,13,15,0.96); backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 14px 20px;
  }
  .quickadd-inner { max-width: 860px; margin: 0 auto; }
  .quickadd-row { display: flex; gap: 10px; position: relative; }
  .quickadd-row .field { flex: 1; position: relative; margin: 0; }
  #inputCode {
    background: var(--surface2); border: 1px solid var(--border); border-radius: 8px;
    color: var(--text); padding: 10px 13px; font-family: 'DM Mono', monospace; font-size: 0.92rem;
    outline: none; transition: border-color 0.2s; width: 100%;
  }
  #inputCode:focus { border-color: var(--accent); }
  #inputCode::placeholder { color: var(--muted); }
  .btn-add-inline {
    background: var(--accent); color: #000; border: none; border-radius: 8px;
    padding: 0 20px; font-family: 'Bebas Neue', sans-serif; font-size: 0.95rem; letter-spacing: 1.5px;
    cursor: pointer; transition: background 0.15s, transform 0.1s; white-space: nowrap;
  }
  .btn-add-inline:hover { background: var(--accent2); }
  .btn-add-inline:active { transform: scale(0.97); }
  .btn-add-inline:disabled { opacity: 0.5; cursor: not-allowed; }
  .error-msg { color: var(--red); font-size: 0.8rem; margin-top: 8px; display: none; }
  .error-msg.show { display: block; }

  .code-hint { font-size: 0.8rem; color: var(--muted); margin-top: 8px; display: none; }
  .code-hint.show { display: block; }
  .code-hint strong { color: var(--accent); font-weight: 600; }
  .code-hint.is-collected strong { color: var(--green); }
  .code-hint.is-collected { color: var(--green); }
  .code-hint.is-unknown { color: var(--red); }

  .chips-row { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 10px; align-items: center; }
  .chips-label { font-size: 0.7rem; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-right: 2px; }
  .chip {
    background: var(--surface2); border: 1px solid var(--border); border-radius: 999px;
    padding: 5px 12px; font-size: 0.78rem; font-family: 'DM Mono', monospace; color: var(--accent);
    cursor: pointer; transition: all 0.15s; line-height: 1;
  }
  .chip:hover { background: rgba(245,197,24,0.12); border-color: var(--accent); }
  .chip-more { color: var(--muted); cursor: default; }
  .chip-more:hover { background: var(--surface2); border-color: var(--border); }
  .chip.collected {
    background: rgba(74,222,128,0.06); border-color: rgba(74,222,128,0.3); color: var(--green);
    cursor: default; opacity: 0.8;
  }
  .chip.collected:hover { background: rgba(74,222,128,0.06); border-color: rgba(74,222,128,0.3); }

  .code-suggestions { position: absolute; top: 100%; left: 0; right: 0; margin-top: 4px; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; max-height: 180px; overflow-y: auto; display: none; z-index: 10; box-shadow: 0 12px 32px rgba(0,0,0,0.4); }
  .code-suggestions.show { display: block; }
  .code-suggestion-item { padding: 10px 13px; cursor: pointer; font-family: 'Bebas Neue', sans-serif; font-size: 0.95rem; letter-spacing: 1px; color: var(--text); transition: background 0.1s; border-bottom: 1px solid rgba(42,45,56,0.5); }
  .code-suggestion-item:hover { background: rgba(245,197,24,0.1); color: var(--accent); }
  .code-suggestion-item:last-child { border-bottom: none; }

  /* ── Tabs ── */
  .tabs-nav {
    position: sticky; z-index: 45;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    display: flex; gap: 4px; padding: 0 20px; overflow-x: auto;
  }
  .tabs-inner-wrap { max-width: 860px; margin: 0 auto; display: flex; gap: 4px; width: 100%; }
  .tab-btn {
    background: none; border: none; color: var(--muted); cursor: pointer;
    font-family: 'Bebas Neue', sans-serif; font-size: 1rem; letter-spacing: 2px;
    padding: 13px 18px 11px; white-space: nowrap; border-bottom: 2px solid transparent;
    transition: color 0.15s, border-color 0.15s;
  }
  .tab-btn:hover { color: var(--text); }
  .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  .container { max-width: 860px; margin: 0 auto; padding: 24px 20px 60px; position: relative; z-index: 1; }
  .stats-bar { display: flex; gap: 14px; flex-wrap: wrap; margin-bottom: 20px; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px 18px; flex: 1; min-width: 110px; }
  .stat-value { font-family: 'Bebas Neue', sans-serif; font-size: 2rem; color: var(--accent); line-height: 1; }
  .stat-label { font-size: 0.72rem; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-top: 2px; }

  .section-title { font-family: 'Bebas Neue', sans-serif; font-size: 1.15rem; letter-spacing: 2px; color: var(--muted); margin-bottom: 16px; }

  .game-row { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
  .section-block { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 20px 22px; }

  .achievements-grid { display: flex; flex-direction: column; gap: 7px; margin-top: 4px; }
  .badge { display: flex; align-items: center; gap: 10px; background: var(--surface2); border: 1px solid var(--border); border-radius: 9px; padding: 9px 11px; position: relative; }
  .badge.unlocked { border-color: rgba(245,197,24,0.4); background: rgba(245,197,24,0.05); }
  .badge.unlocked::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, var(--accent), var(--accent2)); }
  .badge-icon { font-size: 1.3rem; flex-shrink: 0; filter: grayscale(1) opacity(0.2); }
  .badge.unlocked .badge-icon { filter: none; }
  .badge-info { flex: 1; }
  .badge-name { font-size: 0.78rem; font-weight: 600; color: var(--muted); }
  .badge.unlocked .badge-name { color: var(--text); }
  .badge-desc { font-size: 0.67rem; color: var(--muted); margin-top: 1px; opacity: 0.6; }
  .badge-check { font-size: 0.72rem; color: var(--accent); display: none; }
  .badge.unlocked .badge-check { display: block; }

  .code-ranking { display: flex; flex-direction: column; gap: 8px; margin-top: 4px; }
  .code-row { display: flex; align-items: center; gap: 10px; }
  .code-rank { font-family: 'Bebas Neue', sans-serif; font-size: 1rem; color: var(--muted); width: 18px; text-align: center; }
  .code-row:nth-child(1) .code-rank { color: #ffd700; }
  .code-row:nth-child(2) .code-rank { color: #c0c0c0; }
  .code-row:nth-child(3) .code-rank { color: #cd7f32; }
  .code-name { font-family: 'Bebas Neue', sans-serif; font-size: 0.95rem; font-weight: 600; flex: 0 0 160px; max-width: 160px; text-align: left; white-space: normal; overflow-wrap: anywhere; word-break: break-word; padding-right: 8px; }
  .code-bar-wrap { flex: 1; background: var(--surface2); border-radius: 999px; height: 6px; overflow: hidden; }
  .code-bar-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 999px; }
  .code-count { font-family: 'DM Mono', monospace; font-size: 0.76rem; color: var(--accent); width: 22px; text-align: right; }
  .code-empty { color: var(--muted); font-size: 0.83rem; font-style: italic; }

  .toolbar { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; align-items: center; }
  .search-input { flex: 1; min-width: 160px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; color: var(--text); padding: 8px 13px; font-family: 'DM Mono', monospace; font-size: 0.88rem; outline: none; transition: border-color 0.2s; }
  .search-input:focus { border-color: var(--accent); }

  .view-toggle { display: flex; gap: 3px; background: var(--surface2); border: 1px solid var(--border); border-radius: 9px; padding: 3px; }
  .view-toggle-btn { background: none; border: none; color: var(--muted); padding: 6px 13px; border-radius: 7px; font-size: 0.78rem; font-weight: 600; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all 0.15s; white-space: nowrap; }
  .view-toggle-btn.active { background: var(--accent); color: #000; }

  .list-header { font-family: 'Bebas Neue', sans-serif; font-size: 1.05rem; letter-spacing: 2px; color: var(--muted); margin-bottom: 14px; display: flex; align-items: center; justify-content: space-between; }
  .empty-state { text-align: center; padding: 44px 20px; color: var(--muted); }
  .empty-icon { font-size: 2.8rem; margin-bottom: 10px; opacity: 0.35; }

  /* ── Gruppierte Kennzeichen-Grid-Ansicht ── */
  .group-section { margin-bottom: 24px; }
  .group-header { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 11px; padding-bottom: 7px; border-bottom: 1px solid var(--border); }
  .group-title { font-family: 'Bebas Neue', sans-serif; font-size: 1.05rem; letter-spacing: 1.5px; color: var(--text); }
  .group-count { font-family: 'DM Mono', monospace; font-size: 0.76rem; color: var(--muted); }
  .plate-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(118px, 1fr)); gap: 12px; }
  .plate-card {
    position: relative; background: var(--surface); border: 1px solid var(--border); border-radius: 11px;
    padding: 13px 10px 11px; text-align: center; cursor: pointer;
    transition: border-color 0.15s, transform 0.12s; animation: slideIn 0.22s ease;
  }
  @keyframes slideIn { from{opacity:0;transform:translateY(-6px)} to{opacity:1;transform:translateY(0)} }
  .plate-card:hover { border-color: rgba(245,197,24,0.45); transform: translateY(-2px); }
  .plate-card.pending { border-style: dashed; border-color: rgba(245,197,24,0.5); background: rgba(245,197,24,0.04); }
  .mini-plate { display: inline-flex; align-items: center; background: #f7f3e8; border: 2px solid #222; border-radius: 5px; padding: 4px 8px 4px 4px; gap: 5px; }
  .mini-plate-strip { background: #003399; border-radius: 2px; width: 14px; height: 20px; color: #fff; font-size: 6px; font-weight: 700; display: flex; align-items: center; justify-content: center; font-family: 'DM Mono', monospace; flex-shrink: 0; }
  .mini-plate-code { font-family: 'DM Mono', monospace; font-size: 0.85rem; font-weight: 600; color: #111; letter-spacing: 0.5px; }
  .plate-card-name { font-size: 0.7rem; color: var(--muted); margin-top: 8px; white-space: normal; overflow-wrap: break-word; line-height: 1.3; }
  .plate-card-pending { font-size: 0.62rem; color: var(--accent); margin-top: 2px; font-family: 'DM Mono', monospace; }
  .plate-card-delete {
    position: absolute; top: -7px; right: -7px; width: 21px; height: 21px; border-radius: 50%;
    background: var(--surface2); border: 1px solid var(--border); color: var(--muted);
    font-size: 0.65rem; cursor: pointer; display: flex; align-items: center; justify-content: center;
    opacity: 0; transition: opacity 0.15s, color 0.15s, border-color 0.15s;
  }
  .plate-card:hover .plate-card-delete { opacity: 1; }
  .plate-card-delete:hover { color: var(--red); border-color: var(--red); }
  @media (max-width: 480px) { .plate-card-delete { opacity: 1; } }

  /* ── Übersicht: zuletzt erfasst ── */
  .recent-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .recent-list { display: flex; flex-direction: column; gap: 8px; }
  .recent-item { display: flex; align-items: center; gap: 12px; background: var(--surface2); border: 1px solid var(--border); border-radius: 9px; padding: 9px 12px; }
  .recent-code { font-family: 'Bebas Neue', sans-serif; font-size: 1rem; color: var(--accent); width: 40px; text-align: center; flex-shrink: 0; }
  .recent-name { font-size: 0.82rem; flex: 1; }
  .recent-date { font-size: 0.7rem; color: var(--muted); font-family: 'DM Mono', monospace; }
  .link-btn { background: none; border: none; color: var(--accent); font-size: 0.78rem; cursor: pointer; font-family: 'DM Sans', sans-serif; font-weight: 600; }
  .link-btn:hover { text-decoration: underline; }

  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: none; align-items: center; justify-content: center; z-index: 300; backdrop-filter: blur(4px); }
  .modal-overlay.show { display: flex; }
  .modal-content { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 28px; max-width: 420px; width: 90%; box-shadow: 0 24px 64px rgba(0,0,0,0.6); }
  .modal-title { font-family: 'Bebas Neue', sans-serif; font-size: 1.3rem; letter-spacing: 2px; margin-bottom: 20px; }
  .modal-field { display: flex; flex-direction: column; gap: 5px; margin-bottom: 14px; }
  .modal-field label { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 1.5px; color: var(--muted); }
  .modal-field input { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); padding: 10px 13px; font-family: 'DM Mono', monospace; font-size: 0.9rem; outline: none; transition: border-color 0.2s; }
  .modal-field input:focus { border-color: var(--accent); }
  .modal-buttons { display: flex; gap: 10px; margin-top: 24px; }
  .btn-modal { flex: 1; border: none; border-radius: 8px; padding: 11px; font-family: 'Bebas Neue', sans-serif; font-size: 0.95rem; letter-spacing: 2px; cursor: pointer; }
  .btn-save { background: var(--accent); color: #000; }
  .btn-save:hover { background: var(--accent2); }
  .btn-cancel { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }
  .btn-cancel:hover { border-color: var(--accent); color: var(--accent); }
  .modal-error { color: var(--red); font-size: 0.8rem; margin-top: 12px; display: none; }
  .modal-error.show { display: block; }

  .toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(70px); background: var(--accent); color: #000; padding: 11px 24px; border-radius: 999px; font-family: 'Bebas Neue', sans-serif; font-size: 0.95rem; letter-spacing: 2px; z-index: 999; transition: transform 0.3s; }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.toast-offline { background: var(--surface2); color: var(--accent); border: 1px solid rgba(245,197,24,0.4); }

  /* --- Karte --- */
  #mapSection { }
  .map-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; flex-wrap: wrap; gap: 10px; }
  .map-legend { display: flex; gap: 16px; flex-wrap: wrap; font-size: 0.75rem; color: var(--muted); }
  .map-legend-item { display: flex; align-items: center; gap: 6px; }
  .map-legend-swatch { width: 13px; height: 13px; border-radius: 3px; flex-shrink: 0; }
  #map { height: 460px; border-radius: 10px; overflow: hidden; border: 1px solid var(--border); background: #101115; }
  .leaflet-tooltip.kfz-tip {
    background: var(--surface2); border: 1px solid var(--border); border-radius: 7px;
    color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 0.78rem;
    padding: 7px 10px; max-width: 200px; white-space: normal; line-height: 1.5;
    box-shadow: 0 8px 20px rgba(0,0,0,0.4);
  }
  .leaflet-tooltip.kfz-tip .tip-name { font-family: 'Bebas Neue', sans-serif; letter-spacing: 1px; font-size: 0.95rem; display: block; margin-bottom: 2px; color: var(--text); }
  .leaflet-container { background: #101115; font-family: 'DM Sans', sans-serif; }
  .leaflet-control-zoom a { background: var(--surface2) !important; color: var(--text) !important; border-color: var(--border) !important; }
  .leaflet-control-zoom a:hover { background: var(--accent) !important; color: #000 !important; }
  .leaflet-control-attribution { background: rgba(13,13,15,0.8) !important; color: var(--muted) !important; }
  .leaflet-control-attribution a { color: var(--accent) !important; }
  @media (max-width: 640px) { #map { height: 340px; } }
  @media (max-width: 640px) { .nav-user { display: none; } .game-row { grid-template-columns: 1fr; } }

</style>
</head>
<body>

<div class="loading-screen" id="loadingScreen">Lade Kennzeichen…</div>

<nav>
  <a class="nav-back" href="../../index.html">← Portal</a>
  <div class="nav-title"><span>KFZ</span>-Kennzeichen</div>
  <div class="pending-badge" id="pendingBadge" title="Wartet auf Synchronisierung"></div>
  <div class="conn-status" id="connStatus"><span class="conn-dot"></span><span id="connLabel">Online</span></div>
  <div class="nav-user" id="navUser"></div>
</nav>

<!-- Quick-Add: immer sichtbar, unabhängig vom Tab -->
<div class="quickadd-bar">
  <div class="quickadd-inner">
    <div class="quickadd-row">
      <div class="field">
        <input type="text" id="inputCode" placeholder="Code eingeben, z.B. B" maxlength="3" style="text-transform: uppercase;">
        <div class="code-suggestions" id="codeSuggestions"></div>
      </div>
      <button class="btn-add-inline" id="btnAdd" onclick="addEntry()">+ Hinzufügen</button>
    </div>
    <div class="error-msg" id="errorMsg"></div>
    <div class="code-hint" id="codeHint"></div>
    <div class="chips-row" id="chipsRow"></div>
  </div>
</div>

<div class="tabs-nav" style="top:0">
  <div class="tabs-inner-wrap">
    <button class="tab-btn active" data-tab="uebersicht" onclick="setTab('uebersicht')">Übersicht</button>
    <button class="tab-btn" data-tab="sammlung" onclick="setTab('sammlung')">Sammlung</button>
    <button class="tab-btn" data-tab="karte" onclick="setTab('karte')">Karte</button>
    <button class="tab-btn" data-tab="rangliste" onclick="setTab('rangliste')">Rangliste</button>
  </div>
</div>

<div class="container">

  <!-- ═══ TAB: Übersicht ═══ -->
  <div class="tab-panel active" id="panel-uebersicht">
    <div class="stats-bar">
      <div class="stat-card"><div class="stat-value" id="statTotal">0</div><div class="stat-label">Gesammelt</div></div>
      <div class="stat-card"><div class="stat-value" id="statToday">0</div><div class="stat-label">Heute</div></div>
      <div class="stat-card"><div class="stat-value" id="statCodes">0</div><div class="stat-label">Bundesländer</div></div>

<script>
  const SUPABASE_URL = 'https://xtbnrrhzhcvcetsdsfao.supabase.co';
  const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh0Ym5ycmh6aGN2Y2V0c2RzZmFvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxMjgzNTIsImV4cCI6MjA5MDcwNDM1Mn0.haEACxqAosN3dQ2Qz_Y2mzpYDI1RRB4TKjghmpRt_mc';
  const { createClient } = supabase;
  const sb = createClient(SUPABASE_URL, SUPABASE_ANON);

  let entries = [];
  let unlockedAchievements = [];
  let currentUser = null;
  let editingEntryId = null;
  let sammlungView = 'bundesland';
  let allCodes = [];
  let kreiseGeoJSON = null;
  let map = null, geoLayer = null, mapRenderer = null;
  let currentTab = 'uebersicht';

  const QUEUE_KEY = 'kfz_offline_queue_v1';
  const ENTRIES_CACHE_KEY = 'kfz_entries_cache_v1';
  const CODES_CACHE_KEY = 'kfz_codes_cache_v1';
  const TAB_KEY = 'kfz_active_tab_v1';
  const SAMMLUNG_VIEW_KEY = 'kfz_sammlung_view_v1';
  const SESSION_CHIPS_KEY = 'kfz_session_chips_v1';
  const CHIPS_RANDOM_COUNT = 10;
  let isSyncing = false;

  const ACHIEVEMENTS = [
    { id:'first', icon:'🎯', name:'Erster Code', desc:'1 Code gesammelt', check:e=>e.length>=1 },
    { id:'five', icon:'🔥', name:'Auf der Jagd', desc:'5 Codes gesammelt', check:e=>e.length>=5 },
    { id:'ten', icon:'🏅', name:'Zehn drauf', desc:'10 Codes gesammelt', check:e=>e.length>=10 },
    { id:'streak3', icon:'🔥', name:'3-Tage-Serie', desc:'3 Tage hintereinander Einträge', check:e=>getCurrentStreak(e)>=3 },
    { id:'streak7', icon:'⚡️', name:'7-Tage-Serie', desc:'7 Tage hintereinander Einträge', check:e=>getCurrentStreak(e)>=7 },
    { id:'hundred', icon:'🎉', name:'Hundert erreicht', desc:'100 Codes gesammelt', check:e=>e.length>=100 },
    { id:'twofifty', icon:'🏆', name:'Sammler 250', desc:'250 Codes gesammelt', check:e=>e.length>=250 },
    { id:'fivehundred', icon:'🚀', name:'Sammler 500', desc:'500 Codes gesammelt', check:e=>e.length>=500 },
    { id:'half', icon:'⭐', name:'Halbe Sammlung', desc:'Hälfte aller Kennzeichen gesammelt', check:e=>new Set(e.map(x=>x.code)).size>=Math.ceil(allCodes.length/2) },
    { id:'allcodes', icon:'🌍', name:'Alle Codes', desc:'Alle 16 Bundesländer', check:e=>new Set(e.map(x=>x.code)).size>=allCodes.length },
  ];

  function getCurrentStreak(entries) {
    if (!entries || !entries.length) return 0;
    const days = new Set(entries.map(e => new Date(e.created_at).toDateString()));
    let streak = 0;
    const today = new Date();
    for (let i = 0; ; i++) {
      const d = new Date(today);
      d.setDate(today.getDate() - i);
      if (days.has(d.toDateString())) streak++; else break;
    }
    return streak;
  }

  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./service-worker.js').catch(err => {
        console.warn('Service Worker Registrierung fehlgeschlagen:', err);
      });
    });
  }

  // ── Offline-Queue: Helper ───────────────────────────────────
  function loadQueue() {
    try { return JSON.parse(localStorage.getItem(QUEUE_KEY)) || []; }
    catch { return []; }
  }
  function saveQueue(queue) {
    localStorage.setItem(QUEUE_KEY, JSON.stringify(queue));
    updatePendingBadge(queue.length);
  }
  function cacheEntries(list) {
    try { localStorage.setItem(ENTRIES_CACHE_KEY, JSON.stringify(list)); } catch {}
  }
  function readCachedEntries() {
    try { return JSON.parse(localStorage.getItem(ENTRIES_CACHE_KEY)) || []; }
    catch { return []; }
  }
  function cacheCodes(list) {
    try { localStorage.setItem(CODES_CACHE_KEY, JSON.stringify(list)); } catch {}
  }
  function readCachedCodes() {
    try { return JSON.parse(localStorage.getItem(CODES_CACHE_KEY)) || []; }
    catch { return []; }
  }

  function updatePendingBadge(count) {
    const el = document.getElementById('pendingBadge');
    if (count > 0) {
      el.textContent = `⏳ ${count} wartend`;
      el.classList.add('show');
    } else {
      el.classList.remove('show');
      el.classList.remove('syncing');
    }
  }

  function updateConnStatus() {
    const el = document.getElementById('connStatus');
    const label = document.getElementById('connLabel');
    if (navigator.onLine) {
      el.classList.remove('offline');
      label.textContent = 'Online';
    } else {
      el.classList.add('offline');
      label.textContent = 'Offline';
    }
  }

  window.addEventListener('online', () => { updateConnStatus(); syncQueue(); });
  window.addEventListener('offline', updateConnStatus);

  // ── Tabs ─────────────────────────────────────────────────────
  function setTab(tab) {
    currentTab = tab;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    document.getElementById('panel-' + tab).classList.add('active');
    localStorage.setItem(TAB_KEY, tab);

    if (tab === 'karte') {
      if (!map) {
        initMap();
      } else {
        setTimeout(() => map.invalidateSize(), 50);
      }
    }
  }

  // ── Init ─────────────────────────────────────────────────────
  async function init() {
    updateConnStatus();
    updatePendingBadge(loadQueue().length);

    const { data: { session } } = await sb.auth.getSession();
    if (!session) {
      if (navigator.onLine) { window.location.href = '../../index.html'; return; }
    }
    currentUser = session ? session.user : null;
    if (currentUser) document.getElementById('navUser').textContent = currentUser.email;

    await loadCodes();
    await loadEntries();
    await loadMapData();

    sammlungView = localStorage.getItem(SAMMLUNG_VIEW_KEY) || 'bundesland';
    document.querySelectorAll('.view-toggle-btn').forEach(b => b.classList.toggle('active', b.dataset.view === sammlungView));

    const savedTab = localStorage.getItem(TAB_KEY) || 'uebersicht';
    setTab(savedTab);

    document.getElementById('loadingScreen').classList.add('hidden');
    document.getElementById('inputCode').addEventListener('keydown', e => { if(e.key==='Enter') addEntry(); });
    document.getElementById('inputCode').addEventListener('input', () => { updateSuggestions(); updateCodeHint(); });
    document.addEventListener('click', e => {
      if (e.target.id !== 'inputCode' && !e.target.closest('.code-suggestions')) {
        document.getElementById('codeSuggestions').classList.remove('show');
      }
    });

    if (navigator.onLine) syncQueue();
  }

  async function loadCodes() {
    if (!navigator.onLine) {
      allCodes = readCachedCodes();
      return;
    }
    const { data, error } = await sb.from('bundesland_codes').select('code,name,bundesland').order('code');
    if (error) {
      console.error('❌ Fehler beim Laden der Codes:', error);
      allCodes = readCachedCodes();
      return;
    }
    allCodes = data;
    cacheCodes(data);
  }

  async function loadEntries() {
    if (!currentUser) {
      entries = readCachedEntries();
      unlockedAchievements = ACHIEVEMENTS.filter(a => a.check(entries)).map(a => a.id);
      mergeQueueIntoEntries();
      renderAll();
      return;
    }

    if (!navigator.onLine) {
      entries = readCachedEntries();
      unlockedAchievements = ACHIEVEMENTS.filter(a => a.check(entries)).map(a => a.id);
      mergeQueueIntoEntries();
      renderAll();
      return;
    }

    const { data, error } = await sb.from('kennzeichen').select('*').eq('user_id', currentUser.id).order('created_at', { ascending: false });
    if (error) {
      entries = readCachedEntries();
      mergeQueueIntoEntries();
      unlockedAchievements = ACHIEVEMENTS.filter(a => a.check(entries)).map(a => a.id);
      renderAll();
      return;
    }
    entries = data || [];
    cacheEntries(entries);
    mergeQueueIntoEntries();
    unlockedAchievements = ACHIEVEMENTS.filter(a => a.check(entries)).map(a => a.id);
    renderAll();
  }

  function mergeQueueIntoEntries() {
    const queue = loadQueue();
    queue.forEach(q => {
      if (!entries.some(e => e._tempId === q.tempId)) {
        entries.unshift({
          id: `pending-${q.tempId}`,
          _tempId: q.tempId,
          _pending: true,
          code: q.code,
          created_at: q.created_at,
          updated_at: q.created_at,
          user_id: q.user_id
        });
      }
    });
  }

  async function loadMapData() {
    try {
      const res = await fetch('./kreise.geojson');
      kreiseGeoJSON = await res.json();
    } catch (err) {
      console.error('❌ Konnte Kartendaten nicht laden:', err);
    }
  }

  function kfzList(feature) {
    return (feature.properties.KFZ || '').trim().split(/\s+/).filter(Boolean);
  }

  function collectionState(feature) {
    const list = kfzList(feature);
    if (!list.length) return 'none';
    const collectedCodes = new Set(entries.map(e => e.code));
    const have = list.filter(k => collectedCodes.has(k)).length;
    if (have === 0) return 'none';
    if (have === list.length) return 'full';
    return 'partial';
  }

  function mapStyleFeature(feature) {
    const state = collectionState(feature);
    if (state === 'full') return { fillColor: '#f5c518', fillOpacity: 0.85, weight: 1, color: '#e8a800' };
    if (state === 'partial') return { fillColor: 'url(#kfzHatch)', fillOpacity: 1, weight: 1, color: '#e8a800' };
    return { fillColor: '#1e2028', fillOpacity: 0.7, weight: 1, color: '#2a2d38' };
  }

  function mapTooltipHtml(feature) {
    const list = kfzList(feature);
    const state = collectionState(feature);
    const collectedCodes = new Set(entries.map(e => e.code));
    const name = feature.properties.NAME;

    if (state === 'partial') {
      const have = list.filter(k => collectedCodes.has(k));
      const missing = list.filter(k => !collectedCodes.has(k));
      return `<span class="tip-name">${name}</span>✓ ${have.join(', ')}<br><span style="color:var(--muted)">offen: ${missing.join(', ')}</span>`;
    }
    const label = state === 'full' ? 'vollständig gesammelt' : 'noch offen';
    return `<span class="tip-name">${name}</span><span style="color:var(--muted)">${list.join(', ')} — ${label}</span>`;
  }

  function initMap() {
    if (!kreiseGeoJSON || map) return;

    map = L.map('map', { zoomControl: true, attributionControl: true }).setView([51.2, 10.4], 6);

    mapRenderer = L.svg().addTo(map);
    const svgEl = mapRenderer._container;
    const defs = document.createElementNS('http://www.w3.org/2000/svg', 'defs');
    defs.innerHTML = `
      <pattern id="kfzHatch" width="7" height="7" patternTransform="rotate(45)" patternUnits="userSpaceOnUse">
        <rect width="7" height="7" fill="#1e2028"></rect>
        <line x1="0" y1="0" x2="0" y2="7" stroke="#f5c518" stroke-width="3.2"></line>
      </pattern>`;
    svgEl.insertBefore(defs, svgEl.firstChild);

    geoLayer = L.geoJSON(kreiseGeoJSON, {
      renderer: mapRenderer,
      style: mapStyleFeature,
      onEachFeature: (feature, layer) => {
        layer.bindTooltip(mapTooltipHtml(feature), { sticky: true, className: 'kfz-tip' });
        layer.on('mouseover', () => layer.setStyle({ weight: 2.5, color: '#f5c518' }));
        layer.on('mouseout', () => geoLayer.resetStyle(layer));
      }
    }).addTo(map);

    map.fitBounds(geoLayer.getBounds(), { padding: [8, 8] });
    setTimeout(() => map.invalidateSize(), 60);
  }

  function renderMap() {
    if (!geoLayer) return;
    geoLayer.eachLayer(layer => {
      layer.setStyle(mapStyleFeature(layer.feature));
      layer.setTooltipContent(mapTooltipHtml(layer.feature));
    });
  }

  // ── Eintrag hinzufügen (Button ODER Chip) ───────────────────
  async function addEntry() {
    const code = document.getElementById('inputCode').value.trim().toUpperCase();
    await performAdd(code, document.getElementById('btnAdd'));
  }

  async function quickAdd(code) {
    await performAdd(code, null);
  }

  async function performAdd(code, btn) {
    const errEl = document.getElementById('errorMsg');

    if (!code) { errEl.textContent = 'Bitte einen Code eingeben!'; errEl.classList.add('show'); return; }
    if (allCodes.length && !allCodes.some(c => c.code === code)) { errEl.textContent = code + ' ist kein gültiger Code!'; errEl.classList.add('show'); return; }
    if (entries.some(e => e.code === code)) { errEl.textContent = code + ' wurde bereits erfasst!'; errEl.classList.add('show'); return; }
    if (!currentUser) { errEl.textContent = 'Bitte zuerst anmelden (sobald wieder online).'; errEl.classList.add('show'); return; }
    errEl.classList.remove('show');

    if (!navigator.onLine) {
      const tempId = 'q_' + Date.now() + '_' + Math.random().toString(36).slice(2, 8);
      const nowIso = new Date().toISOString();
      const queue = loadQueue();
      queue.push({ tempId, code, user_id: currentUser.id, created_at: nowIso });
      saveQueue(queue);

      entries.unshift({
        id: `pending-${tempId}`, _tempId: tempId, _pending: true,
        code, created_at: nowIso, updated_at: nowIso, user_id: currentUser.id
      });
      cacheEntries(entries.filter(e => !e._pending));
      checkAchievements();
      renderAll();

      document.getElementById('inputCode').value = '';
      document.getElementById('codeSuggestions').classList.remove('show');
      updateCodeHint();
      showToast('📡 Offline gespeichert — wird synchronisiert, sobald du wieder online bist', true);
      return;
    }

    if (btn) { btn.disabled = true; btn.textContent = '…'; }
    const { data, error } = await sb.from('kennzeichen').insert({ user_id: currentUser.id, code }).select().single();
    if (btn) { btn.disabled = false; btn.textContent = '+ Hinzufügen'; }

    if (error) { errEl.textContent = 'Fehler: ' + error.message; errEl.classList.add('show'); return; }
    entries.unshift(data);
    cacheEntries(entries.filter(e => !e._pending));
    checkAchievements();
    renderAll();
    document.getElementById('inputCode').value = '';
    document.getElementById('codeSuggestions').classList.remove('show');
    updateCodeHint();
    document.getElementById('inputCode').focus();
    const codeData = allCodes.find(c => c.code === code);
    const nameLabel = codeData ? `${codeData.name} (${codeData.bundesland})` : '';
    showToast(`${code} — ${nameLabel} erfasst! 🎯`);
  }

  async function syncQueue() {
    if (isSyncing || !currentUser) return;
    const queue = loadQueue();
    if (!queue.length) return;

    isSyncing = true;
    const badge = document.getElementById('pendingBadge');
    badge.classList.add('syncing');

    const stillQueued = [];
    let syncedCount = 0;

    for (const item of queue) {
      if (!navigator.onLine) { stillQueued.push(item); continue; }
      try {
        const { data: existing } = await sb.from('kennzeichen').select('id').eq('user_id', item.user_id).eq('code', item.code).maybeSingle();
        if (existing) {
          syncedCount++;
          continue;
        }
        const { error } = await sb.from('kennzeichen').insert({ user_id: item.user_id, code: item.code, created_at: item.created_at });
        if (error) { stillQueued.push(item); }
        else { syncedCount++; }
      } catch (err) {
        stillQueued.push(item);
      }
    }

    saveQueue(stillQueued);
    isSyncing = false;
    badge.classList.remove('syncing');

    if (syncedCount > 0) {
      await loadEntries();
      showToast(`✓ ${syncedCount} offline erfasste${syncedCount===1?'r':''} Code${syncedCount===1?'':'s'} synchronisiert`);
    }
  }

  async function deleteEntry(id) {
    const entry = entries.find(e => e.id === id);
    if (entry && entry._pending) {
      const queue = loadQueue().filter(q => q.tempId !== entry._tempId);
      saveQueue(queue);
      entries = entries.filter(e => e.id !== id);
      renderAll();
      return;
    }
    await sb.from('kennzeichen').delete().eq('id', id).eq('user_id', currentUser.id);
    entries = entries.filter(e => e.id !== id);
    cacheEntries(entries.filter(e => !e._pending));
    renderAll();
  }

  function updateSuggestions() {
    const input = document.getElementById('inputCode');
    const suggestionsEl = document.getElementById('codeSuggestions');
    const query = input.value.trim().toUpperCase();

    if (!query) {
      suggestionsEl.classList.remove('show');
      return;
    }

    const alreadyAdded = entries.map(e => e.code);
    const suggestions = allCodes.filter(c => c.code.startsWith(query) && !alreadyAdded.includes(c.code));

    if (suggestions.length === 0) {
      suggestionsEl.classList.remove('show');
      return;
    }

    suggestionsEl.innerHTML = suggestions.map(c => 
      `<div class="code-suggestion-item" onclick="selectSuggestion('${c.code}')">${c.code}</div>`
    ).join('');
    suggestionsEl.classList.add('show');
  }

  function selectSuggestion(code) {
    document.getElementById('inputCode').value = code;
    document.getElementById('codeSuggestions').classList.remove('show');
    document.getElementById('inputCode').focus();
    updateCodeHint();
  }

  // ── Live-Hinweis: zeigt beim Tippen an, für welches Kennzeichen der Code steht ──
  function updateCodeHint() {
    const hintEl = document.getElementById('codeHint');
    const query = document.getElementById('inputCode').value.trim().toUpperCase();
    hintEl.classList.remove('is-collected', 'is-unknown');

    if (!query) { hintEl.classList.remove('show'); return; }

    const codeData = allCodes.find(c => c.code === query);
    if (!codeData) {
      hintEl.textContent = query + ' ist kein bekanntes Kennzeichen.';
      hintEl.classList.add('show', 'is-unknown');
      return;
    }

    const alreadyCollected = entries.some(e => e.code === query);
    if (alreadyCollected) {
      hintEl.innerHTML = `<strong>${codeData.code}</strong> — ${codeData.name} (${codeData.bundesland}) · ✓ bereits gesammelt`;
      hintEl.classList.add('show', 'is-collected');
    } else {
      hintEl.innerHTML = `<strong>${codeData.code}</strong> — ${codeData.name} (${codeData.bundesland})`;
      hintEl.classList.add('show');
    }
  }

  // ── Zufällige Codes für die Schnellauswahl: einmal pro Sitzung ──
  function shuffleArray(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function getSessionChipCodes() {
    if (!allCodes.length) return [];
    const validCodes = new Set(allCodes.map(c => c.code));
    let stored = null;
    try { stored = JSON.parse(sessionStorage.getItem(SESSION_CHIPS_KEY)); } catch {}
    if (Array.isArray(stored) && stored.length && stored.every(code => validCodes.has(code))) {
      return stored;
    }
    const picked = shuffleArray(allCodes).slice(0, CHIPS_RANDOM_COUNT).map(c => c.code);
    try { sessionStorage.setItem(SESSION_CHIPS_KEY, JSON.stringify(picked)); } catch {}
    return picked;
  }

  // ── Schnellauswahl-Chips: 10 zufällige Codes pro Sitzung ────
  function renderChips() {
    const el = document.getElementById('chipsRow');
    if (!allCodes.length) { el.innerHTML = ''; return; }
    const chipCodes = getSessionChipCodes().map(code => allCodes.find(c => c.code === code)).filter(Boolean);
    const have = new Set(entries.map(e => e.code));
    const allCollected = chipCodes.every(c => have.has(c.code));

    let html = `<span class="chips-label">${allCollected ? '🎉 Auswahl komplett gesammelt!' : 'Schnellauswahl:'}</span>`;
    html += chipCodes.map(c => {
      const title = `${c.name} (${c.bundesland})`;
      if (have.has(c.code)) {
        return `<span class="chip collected" title="${title} — bereits gesammelt">✓ ${c.code}</span>`;
      }
      return `<button class="chip" onclick="quickAdd('${c.code}')" title="${title}">${c.code}</button>`;
    }).join('');
    el.innerHTML = html;
  }

  function openEditModal(id) {
    const entry = entries.find(e => e.id === id);
    if (entry && entry._pending) {
      showToast('Wartende Einträge können erst nach der Synchronisierung bearbeitet werden.');
      return;
    }
    editingEntryId = id;
    document.getElementById('modalCode').value = entry.code;
    document.getElementById('modalError').classList.remove('show');
    document.getElementById('editModal').classList.add('show');
  }

  function closeEditModal() {
    editingEntryId = null;
    document.getElementById('editModal').classList.remove('show');
  }

  async function saveEdit() {
    if (!navigator.onLine) {
      document.getElementById('modalError').textContent = 'Bearbeiten ist offline nicht möglich.';
      document.getElementById('modalError').classList.add('show');
      return;
    }
    const code = document.getElementById('modalCode').value.trim().toUpperCase();
    const errEl = document.getElementById('modalError');

    if (!code) { errEl.textContent = 'Code erforderlich!'; errEl.classList.add('show'); return; }
    if (!allCodes.some(c => c.code === code)) { errEl.textContent = 'Kein gültiger Code!'; errEl.classList.add('show'); return; }
    if (entries.some(e => e.id !== editingEntryId && e.code === code)) { errEl.textContent = 'Existiert bereits!'; errEl.classList.add('show'); return; }

    await sb.from('kennzeichen').update({ code, updated_at: new Date().toISOString() }).eq('id', editingEntryId);
    await loadEntries();
    closeEditModal();
    const codeData = allCodes.find(c => c.code === code);
    const nameLabel = codeData ? `${codeData.name} (${codeData.bundesland})` : '';
    showToast(`${code} — ${nameLabel} aktualisiert!`);
  }

  function checkAchievements() {
    ACHIEVEMENTS.forEach(a => {
      if (!unlockedAchievements.includes(a.id) && a.check(entries)) {
        unlockedAchievements.push(a.id);
        setTimeout(() => showToast('🏅 ' + a.name), 500);
      }
    });
  }

  function setSammlungView(view) {
    sammlungView = view;
    localStorage.setItem(SAMMLUNG_VIEW_KEY, view);
    document.querySelectorAll('.view-toggle-btn').forEach(b => b.classList.toggle('active', b.dataset.view === view));
    renderList();
  }

  function getFiltered() {
    const q = document.getElementById('searchInput').value.toLowerCase();
    if (!q) return entries;
    return entries.filter(e => {
      const codeData = allCodes.find(c => c.code === e.code);
      const name = codeData ? codeData.name.toLowerCase() : '';
      const bundesland = codeData ? codeData.bundesland.toLowerCase() : '';
      return e.code.toLowerCase().includes(q) || name.includes(q) || bundesland.includes(q);
    });
  }

  function groupByBundesland(list) {
    const groups = {};
    list.forEach(e => {
      const codeData = allCodes.find(c => c.code === e.code);
      const key = codeData ? codeData.bundesland : 'Unbekannt';
      (groups[key] = groups[key] || []).push(e);
    });
    return groups;
  }

  function groupByTime(list) {
    const groups = { 'Heute': [], 'Gestern': [], 'Diese Woche': [], 'Älter': [] };
    const now = new Date();
    const todayStr = now.toDateString();
    const yesterday = new Date(now); yesterday.setDate(now.getDate() - 1);
    const yesterdayStr = yesterday.toDateString();
    list.forEach(e => {
      const d = new Date(e.created_at);
      const diffDays = (now - d) / 86400000;
      if (d.toDateString() === todayStr) groups['Heute'].push(e);
      else if (d.toDateString() === yesterdayStr) groups['Gestern'].push(e);
      else if (diffDays <= 7) groups['Diese Woche'].push(e);
      else groups['Älter'].push(e);
    });
    Object.keys(groups).forEach(k => { if (!groups[k].length) delete groups[k]; });
    return groups;
  }

  function renderPlateCard(e) {
    const codeData = allCodes.find(c => c.code === e.code);
    const name = codeData ? codeData.name : '';
    const pendingBadge = e._pending ? '<div class="plate-card-pending">⏳ wartet</div>' : '';
    return `<div class="plate-card ${e._pending ? 'pending' : ''}" onclick="openEditModal('${e.id}')" title="${name}">
      <button class="plate-card-delete" onclick="event.stopPropagation(); deleteEntry('${e.id}')" aria-label="Löschen">✕</button>
      <div class="mini-plate">
        <div class="mini-plate-strip">D</div>
        <span class="mini-plate-code">${e.code}</span>
      </div>
      <div class="plate-card-name">${name}</div>
      ${pendingBadge}
    </div>`;
  }

  function renderStats() {
    const todayStr = new Date().toDateString();
    const uniqueBundeslaender = new Set(entries.map(e => {
      const codeData = allCodes.find(c => c.code === e.code);
      return codeData ? codeData.bundesland : null;
    }).filter(b => b)).size;

    const totalCodes = entries.length;
    const allCodesCount = allCodes.length || 1;
    const progressPercent = Math.round((totalCodes / allCodesCount) * 100);
    const currentStreak = getCurrentStreak(entries);

    document.getElementById('statTotal').textContent = totalCodes;
    document.getElementById('statToday').textContent = entries.filter(e=>new Date(e.created_at).toDateString()===todayStr).length;
    document.getElementById('statCodes').textContent = uniqueBundeslaender;
    document.getElementById('statStreak').textContent = currentStreak;
    document.getElementById('statProgress').textContent = progressPercent + '%';
  }

  function renderRecentPreview() {
    const el = document.getElementById('recentPreview');
    const recent = entries.slice(0, 3);
    if (!recent.length) {
      el.innerHTML = '<div class="empty-state" style="padding:24px 10px;"><div class="empty-icon" style="font-size:2rem;">🚗</div><p>Noch nichts erfasst — leg oben los!</p></div>';
      return;
    }
    el.innerHTML = recent.map(e => {
      const codeData = allCodes.find(c => c.code === e.code);
      const name = codeData ? codeData.name : '';
      const d = new Date(e.updated_at || e.created_at);
      const dateStr = d.toDateString()===new Date().toDateString() ? 'Heute ' + d.toLocaleTimeString('de',{hour:'2-digit',minute:'2-digit'}) : d.toLocaleDateString('de');
      return `<div class="recent-item"><div class="recent-code">${e.code}</div><div class="recent-name">${name}${e._pending ? ' <span style="color:var(--accent);font-size:0.7rem;">⏳</span>' : ''}</div><div class="recent-date">${dateStr}</div></div>`;
    }).join('');
  }

  function renderAchievements() {
    document.getElementById('achievementsGrid').innerHTML = ACHIEVEMENTS.map(a => {
      const u = unlockedAchievements.includes(a.id);
      return `<div class="badge ${u?'unlocked':''}"><div class="badge-icon">${a.icon}</div><div class="badge-info"><div class="badge-name">${a.name}</div><div class="badge-desc">${a.desc}</div></div><div class="badge-check">✓</div></div>`;
    }).join('');
  }

  function renderCodeRanking() {
    const el = document.getElementById('codeRanking');

    const bundeslandCounts = {};
    entries.forEach(e => {
      const codeData = allCodes.find(c => c.code === e.code);
      if (codeData) {
        const bundesland = codeData.bundesland;
        bundeslandCounts[bundesland] = (bundeslandCounts[bundesland] || 0) + 1;
      }
    });

    const ranking = Object.entries(bundeslandCounts)
      .map(([bundesland, count]) => ({ bundesland, count }))
      .sort((a, b) => b.count - a.count);

    if (!ranking.length) { 
      el.innerHTML = '<div class="code-empty">Noch keine Codes</div>'; 
      return; 
    }

    const maxCount = Math.max(...ranking.map(r => r.count));
    el.innerHTML = ranking.map((item, i) => {
      const totalFor = allCodes.filter(c => c.bundesland === item.bundesland).length || 0;
      const collected = item.count;
      return `<div class="code-row">
        <div class="code-rank">${i+1}</div>
        <div class="code-name" title="${item.bundesland}">${item.bundesland}<div style="font-size:0.72rem;color:var(--muted);margin-top:2px">${collected}/${totalFor}</div></div>
        <div class="code-bar-wrap"><div class="code-bar-fill" style="width:${(item.count / maxCount) * 100}%"></div></div>
        <div class="code-count">${item.count}</div>
      </div>`;
    }).join('');
  }

  function renderList() {
    const grid = document.getElementById('entriesGrid');
    const filtered = getFiltered();
    document.getElementById('listCount').textContent = filtered.length + ' Einträge';
    if (!filtered.length) { grid.innerHTML = '<div class="empty-state"><div class="empty-icon">🚗</div><p>Nichts hier</p></div>'; return; }

    const groups = sammlungView === 'zeit' ? groupByTime(filtered) : groupByBundesland(filtered);

    let orderedKeys = Object.keys(groups);
    if (sammlungView === 'zeit') {
      const order = ['Heute', 'Gestern', 'Diese Woche', 'Älter'];
      orderedKeys = order.filter(k => orderedKeys.includes(k));
    } else {
      orderedKeys = orderedKeys.sort((a, b) => a === 'Unbekannt' ? 1 : b === 'Unbekannt' ? -1 : a.localeCompare(b, 'de'));
    }

    grid.innerHTML = orderedKeys.map(key => {
      const groupEntries = groups[key];
      let countLabel = groupEntries.length;
      if (sammlungView === 'bundesland') {
        const totalFor = allCodes.filter(c => c.bundesland === key).length;
        if (totalFor) countLabel = `${groupEntries.length}/${totalFor}`;
      }
      return `<div class="group-section">
        <div class="group-header">
          <span class="group-title">${key}</span>
          <span class="group-count">${countLabel}</span>
        </div>
        <div class="plate-grid">${groupEntries.map(renderPlateCard).join('')}</div>
      </div>`;
    }).join('');
  }

  function renderAll() {
    renderStats();
    renderRecentPreview();
    renderAchievements();
    renderCodeRanking();
    renderList();
    renderChips();
    renderMap();
    updateCodeHint();
  }

  function showToast(msg, offlineStyle = false, duration = 10000) {
    const t = document.getElementById('toast');
    if (t._toastTimeout) { clearTimeout(t._toastTimeout); t._toastTimeout = null; }
    t.textContent = msg;
    t.classList.toggle('toast-offline', offlineStyle);
    t.classList.add('show');
    const hide = () => { t.classList.remove('show'); if (t._toastTimeout) { clearTimeout(t._toastTimeout); t._toastTimeout = null; } };
    t.onclick = hide;
    t._toastTimeout = setTimeout(() => { t.classList.remove('show'); t._toastTimeout = null; t.onclick = null; }, duration);
  }

  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeEditModal(); });
  init();
</script>
</body>
</html>
